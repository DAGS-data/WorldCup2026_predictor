<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 Predictor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0e14; --card: #131820; --border: #1e2530; --text: #e6edf3;
  --muted: #8b949e; --accent: #ff6b35; --blue: #4dabf7;
  --green: #2ecc71; --yellow: #f39c12; --red: #e74c3c;
  --radius: 12px; --transition: 0.2s ease;
}
body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
a { color: var(--blue); text-decoration: none; }
button { cursor: pointer; font-family: inherit; }

/* Nav */
nav { position: sticky; top: 0; z-index: 100; background: rgba(10,14,20,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 32px; height: 56px; }
nav .logo { font-size: 18px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; }
nav .nav-links { display: flex; gap: 4px; }
nav .nav-links button { background: none; border: none; color: var(--muted); font-size: 14px; font-weight: 500; padding: 8px 16px; border-radius: 8px; transition: var(--transition); }
nav .nav-links button:hover { color: var(--text); background: rgba(255,255,255,0.05); }
nav .nav-links button.active { color: var(--accent); background: rgba(255,107,53,0.1); }

/* Layout */
.container { max-width: 1200px; margin: 0 auto; padding: 24px; }
.page { display: none; }
.page.active { display: block; }

/* Skeleton */
.skeleton { background: linear-gradient(90deg, var(--border) 25%, #252d38 50%, var(--border) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* Filters */
.filters { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 24px; }
.filters button { background: var(--card); border: 1px solid var(--border); color: var(--muted); padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; transition: var(--transition); }
.filters button:hover { border-color: var(--accent); color: var(--text); }
.filters button.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* Team grid */
.team-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
@media (max-width: 900px) { .team-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 560px) { .team-grid { grid-template-columns: 1fr; } }
.team-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; display: flex; align-items: center; gap: 14px; transition: var(--transition); cursor: pointer; }
.team-card:hover { border-color: var(--accent); transform: translateY(-1px); }
.team-card img.flag { width: 48px; height: 32px; border-radius: 4px; object-fit: cover; }
.team-card .flag-fallback { display: none; font-size: 32px; }
.team-card .info { flex: 1; }
.team-card .name { font-weight: 600; font-size: 15px; }
.team-card .code { font-size: 11px; color: var(--muted); background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px; display: inline-block; margin-top: 4px; }
.team-card .rating { font-size: 12px; font-weight: 600; padding: 3px 8px; border-radius: 6px; }
.rating-elite { background: rgba(46,204,113,0.15); color: var(--green); }
.rating-strong { background: rgba(77,171,247,0.15); color: var(--blue); }
.rating-average { background: rgba(243,156,18,0.15); color: var(--yellow); }
.rating-weak { background: rgba(231,76,60,0.15); color: var(--red); }

/* Match grid */
.match-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
@media (max-width: 700px) { .match-grid { grid-template-columns: 1fr; } }
.match-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
.match-card .match-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.match-card .stage-badge { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 4px; }
.badge-completed { background: rgba(46,204,113,0.15); color: var(--green); }
.badge-live { background: rgba(231,76,60,0.15); color: var(--red); animation: pulse 1.5s infinite; }
.badge-scheduled { background: rgba(139,148,158,0.15); color: var(--muted); }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
.match-card .teams { display: flex; align-items: center; justify-content: center; gap: 12px; }
.match-card .team { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; }
.match-card .team img.flag { width: 40px; height: 28px; border-radius: 3px; object-fit: cover; }
.match-card .team .flag-fallback { display: none; font-size: 28px; }
.match-card .team .tname { font-size: 13px; font-weight: 500; text-align: center; }
.match-card .score { font-size: 28px; font-weight: 800; letter-spacing: 2px; }
.match-card .vs { color: var(--muted); font-size: 14px; font-weight: 500; }
.match-card .meta { font-size: 12px; color: var(--muted); margin-top: 10px; text-align: center; }
.match-card .prob-bar { display: flex; height: 6px; border-radius: 3px; overflow: hidden; margin-top: 10px; }
.match-card .prob-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-top: 4px; }
.match-card .pred-score { text-align: center; font-size: 13px; color: var(--blue); margin-top: 4px; }

/* Team detail page */
.team-detail { max-width: 700px; margin: 0 auto; }
.back-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 8px; font-size: 14px; margin-bottom: 24px; display: inline-flex; align-items: center; gap: 6px; }
.back-btn:hover { border-color: var(--accent); }
.detail-header { display: flex; align-items: center; gap: 24px; margin-bottom: 32px; }
.detail-header img.flag { width: 120px; height: 80px; border-radius: 8px; object-fit: cover; }
.detail-header .flag-fallback { display: none; font-size: 64px; }
.detail-header h1 { font-size: 40px; font-weight: 800; }
.big-rating { font-size: 72px; font-weight: 800; color: var(--accent); line-height: 1; }
.big-rating span { font-size: 24px; color: var(--muted); font-weight: 400; }
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 32px; }
@media (max-width: 600px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; text-align: center; }
.stat-card .stat-value { font-size: 24px; font-weight: 700; }
.stat-card .stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.host-badge { display: inline-block; background: var(--accent); color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-bottom: 16px; }
.form-section h3 { font-size: 16px; margin-bottom: 12px; }
.form-timeline { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.form-box { width: 36px; height: 36px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; }
.form-W { background: rgba(46,204,113,0.15); color: var(--green); }
.form-D { background: rgba(243,156,18,0.15); color: var(--yellow); }
.form-L { background: rgba(231,76,60,0.15); color: var(--red); }
.form-details { display: flex; gap: 6px; flex-wrap: wrap; }
.form-match { font-size: 11px; color: var(--muted); background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px; text-align: center; max-width: 80px; }
.form-match .score { font-size: 12px; color: var(--text); }

/* Bracket */
.bracket-wrapper { overflow-x: auto; padding-bottom: 16px; }
.bracket { display: flex; gap: 24px; min-width: 900px; }
.bracket-round { flex: 1; min-width: 180px; }
.bracket-round h4 { text-align: center; font-size: 13px; color: var(--muted); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 1px; }
.bracket-match { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 10px; margin-bottom: 8px; }
.bracket-match .bt { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.bracket-match .bt img.flag { width: 24px; height: 16px; border-radius: 2px; }
.bracket-match .bt .flag-fallback { font-size: 16px; }
.bracket-match .bt .bn { font-size: 12px; font-weight: 500; flex: 1; }
.bracket-match .bt .bs { font-size: 14px; font-weight: 700; }
.bracket-match .bt .bprob { font-size: 10px; color: var(--muted); }

/* Predict dropdown */
.predict-section { margin-top: 32px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
.predict-section h3 { margin-bottom: 12px; }
.predict-section select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 8px; width: 100%; font-size: 14px; font-family: inherit; margin-bottom: 12px; }
.predict-section .pred-result { margin-top: 12px; padding: 16px; background: var(--bg); border-radius: 8px; display: none; }
.predict-section .pred-result.show { display: block; }

/* Map */
.detail-map { width: 100%; height: 280px; border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 24px; z-index: 1; }

/* Empty/error state */
.empty-state { text-align: center; padding: 48px; color: var(--muted); }
.empty-state button { margin-top: 12px; background: var(--accent); color: #fff; border: none; padding: 10px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; }

/* Utility */
.loading-text { text-align: center; padding: 48px; color: var(--muted); font-size: 14px; }
.hidden { display: none !important; }
</style>
</head>
<body>

<nav>
  <div class="logo">⚽ World Cup 2026 Predictor</div>
  <div class="nav-links">
    <button onclick="navigate('teams')" class="active" data-page="teams">Teams</button>
    <button onclick="navigate('matches')" data-page="matches">Matches</button>
    <button onclick="navigate('bracket')" data-page="bracket">Bracket</button>
  </div>
</nav>

<div class="container">
  <!-- PAGE: Teams -->
  <div id="page-teams" class="page active">
    <div id="teams-filters" class="filters"></div>
    <div id="teams-grid" class="team-grid"></div>
    <div id="teams-loading" class="loading-text">Loading teams...</div>
    <div id="teams-error" class="empty-state hidden"><p>Failed to load teams</p><button onclick="loadAllData()">Retry</button></div>
  </div>

  <!-- PAGE: Matches -->
  <div id="page-matches" class="page">
    <div id="matches-stage-filters" class="filters"></div>
    <div id="matches-group-filters" class="filters" style="display:none"></div>
    <div id="matches-grid" class="match-grid"></div>
    <div id="matches-loading" class="loading-text">Loading matches...</div>
    <div id="matches-error" class="empty-state hidden"><p>Failed to load matches</p><button onclick="loadAllData()">Retry</button></div>
  </div>

  <!-- PAGE: Team Detail -->
  <div id="page-detail" class="page">
    <div id="detail-content"></div>
  </div>

  <!-- PAGE: Bracket -->
  <div id="page-bracket" class="page">
    <div id="bracket-content"></div>
    <div id="bracket-loading" class="loading-text">Loading bracket...</div>
    <div id="bracket-error" class="empty-state hidden"><p>Failed to load bracket</p><button onclick="loadAllData()">Retry</button></div>
  </div>
</div>

<script>
// ===================== DATA STORE =====================
const API = 'http://localhost:8000';
let store = { teams: null, matches: null, bracket: null, groups: null };
let currentPage = 'teams';
let activeTeamId = null;

// ===================== ROUTING =====================
function navigate(page, teamId) {
  currentPage = page;
  if (teamId !== undefined) activeTeamId = teamId;
  
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  
  document.querySelectorAll('[data-page]').forEach(b => b.classList.remove('active'));
  // Nav highlight (only for pages with nav buttons)
  const navBtn = document.querySelector('[data-page="' + page + '"]');
  if (navBtn) navBtn.classList.add('active');
  
  if (page === 'detail' && teamId !== undefined) renderTeamDetail(teamId);
  if (page === 'teams' && store.teams) renderTeams();
  if (page === 'matches' && store.matches) renderMatches();
  if (page === 'bracket' && store.bracket) renderBracket();
  
  window.scrollTo(0, 0);
}

// ===================== DATA LOADING =====================
async function loadAllData() {
  document.getElementById('teams-error').classList.add('hidden');
  document.getElementById('matches-error').classList.add('hidden');
  document.getElementById('bracket-error').classList.add('hidden');
  document.getElementById('teams-loading').style.display = 'block';
  document.getElementById('matches-loading').style.display = 'block';
  
  const [teamsR, matchesR, bracketR, groupsR] = await Promise.allSettled([
    fetch(API+'/api/teams').then(r=>r.json()),
    fetch(API+'/api/matches').then(r=>r.json()),
    fetch(API+'/api/bracket').then(r=>r.json()),
    fetch(API+'/api/groups').then(r=>r.json()),
  ]);
  
  store.teams = teamsR.status === 'fulfilled' ? teamsR.value : null;
  store.matches = matchesR.status === 'fulfilled' ? matchesR.value : null;
  store.bracket = bracketR.status === 'fulfilled' ? bracketR.value : null;
  store.groups = groupsR.status === 'fulfilled' ? groupsR.value : null;
  
  document.getElementById('teams-loading').style.display = 'none';
  document.getElementById('matches-loading').style.display = 'none';
  
  if (!store.teams) document.getElementById('teams-error').classList.remove('hidden');
  if (!store.matches) document.getElementById('matches-error').classList.remove('hidden');
  
  if (currentPage === 'teams') renderTeams();
  if (currentPage === 'matches') renderMatches();
  if (currentPage === 'bracket' && store.bracket) renderBracket();
}

// ===================== FLAG HELPER =====================
function flagImg(team) {
  if (!team || !team.flag_code) return '🏳️';
  return '<img src="https://flagcdn.com/w160/' + team.flag_code + '.png" class="flag" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'block\'" alt="' + team.name + '"><span class="flag-fallback">' + (team.flag_emoji || '🏳️') + '</span>';
}

// ===================== RENDER: TEAMS =====================
function renderTeams(filterGroup) {
  const t = store.teams;
  if (!t) return;
  
  // Filters
  const filtersDiv = document.getElementById('teams-filters');
  let groups = [...new Set(t.map(x => x.group))].sort();
  filtersDiv.innerHTML = '<button class="active" onclick="renderTeams(null)">All</button>' +
    groups.map(g => '<button onclick="renderTeams(\'' + g + '\')">' + g + '</button>').join('');
  
  // Grid
  const filtered = filterGroup ? t.filter(x => x.group === filterGroup) : t;
  const grid = document.getElementById('teams-grid');
  grid.innerHTML = filtered.map(team => {
    let ratingClass = 'rating-weak';
    const r10 = team.performance ? team.performance.rating_10 : (team.elo_rating > 1900 ? 9 : team.elo_rating > 1750 ? 7 : team.elo_rating > 1600 ? 5 : 3);
    if (r10 >= 8) ratingClass = 'rating-elite';
    else if (r10 >= 6) ratingClass = 'rating-strong';
    else if (r10 >= 4) ratingClass = 'rating-average';
    
    return '<div class="team-card" onclick="navigate(\'detail\', ' + team.id + ')">' +
      flagImg(team) +
      '<div class="info"><div class="name">' + team.name + '</div>' +
      '<span class="code">' + (team.code || '') + '</span>' +
      '</div>' +
      '<span class="rating ' + ratingClass + '">' + r10 + '/10</span>' +
      '</div>';
  }).join('');
  
  // Update filter active states
  filtersDiv.querySelectorAll('button').forEach(b => {
    b.classList.toggle('active', (b.textContent === (filterGroup || 'All')));
  });
}

// ===================== RENDER: MATCHES =====================
function renderMatches(stage, filterGroup) {
  const m = store.matches;
  if (!m) return;
  
  // Stage filters
  const stageDiv = document.getElementById('matches-stage-filters');
  stageDiv.innerHTML = '<button class="active" onclick="renderMatches(null)">All</button>' +
    '<button onclick="renderMatches(\'group\')">Group Stage</button>' +
    '<button onclick="renderMatches(\'knockout\')">Knockout</button>';
  
  // Group filters (only for group stage)
  const groupDiv = document.getElementById('matches-group-filters');
  if (stage === 'group' || !stage) {
    groupDiv.style.display = 'flex';
    let groups = [...new Set(m.filter(x=>x.group).map(x=>x.group))].sort();
    groupDiv.innerHTML = '<button class="active" onclick="renderMatches(\''+(stage||'null')+'\',null)">All</button>' +
      groups.map(g => '<button onclick="renderMatches(\''+(stage||'null')+'\',\''+g+'\')">' + g + '</button>').join('');
  } else {
    groupDiv.style.display = 'none';
  }
  
  let filtered = m;
  if (stage === 'group') filtered = m.filter(x => x.stage === 'group');
  if (stage === 'knockout') filtered = m.filter(x => x.stage !== 'group');
  if (filterGroup && (stage === 'group' || !stage)) filtered = filtered.filter(x => x.group === filterGroup);
  
  const grid = document.getElementById('matches-grid');
  grid.innerHTML = filtered.map(match => {
    const t1 = store.teams ? store.teams.find(x => x.id === match.team1_id) : null;
    const t2 = store.teams ? store.teams.find(x => x.id === match.team2_id) : null;
    const t1Name = t1 ? t1.name : 'TBD';
    const t2Name = t2 ? t2.name : 'TBD';
    const t1Flag = t1 ? flagImg(t1) : '<span class="flag-fallback">❓</span>';
    const t2Flag = t2 ? flagImg(t2) : '<span class="flag-fallback">❓</span>';
    const status = match.status || 'scheduled';
    const badgeClass = status === 'completed' ? 'badge-completed' : status === 'live' ? 'badge-live' : 'badge-scheduled';
    const statusText = status.charAt(0).toUpperCase() + status.slice(1);
    const stageText = match.stage === 'round_of_32' ? 'R32' : match.stage === 'group' ? 'Group ' + match.group : match.stage;
    
    let scoreOrVs = '';
    if (status === 'completed' && match.score) {
      scoreOrVs = '<span class="score">' + match.score.team1 + ' - ' + match.score.team2 + '</span>';
    } else if (match.prediction && match.prediction.predicted_score) {
      scoreOrVs = '<span class="vs">vs</span>';
    } else {
      scoreOrVs = '<span class="vs">vs</span>';
    }
    
    let probHtml = '';
    if (match.prediction && (status === 'scheduled' || status === 'live')) {
      const p = match.prediction;
      probHtml = '<div class="prob-bar">' +
        '<div style="background:var(--green);width:'+p.team1_win_prob+'%"></div>' +
        '<div style="background:var(--muted);width:'+p.draw_prob+'%"></div>' +
        '<div style="background:var(--red);width:'+p.team2_win_prob+'%"></div>' +
        '</div>' +
        '<div class="prob-labels"><span>'+p.team1_win_prob+'%</span><span>'+p.draw_prob+'%</span><span>'+p.team2_win_prob+'%</span></div>' +
        '<div class="pred-score">Predicted: ' + p.predicted_score + '</div>';
    }
    
    return '<div class="match-card">' +
      '<div class="match-header"><span class="stage-badge">' + stageText + '</span>' +
      '<span class="stage-badge ' + badgeClass + '">' + statusText + '</span></div>' +
      '<div class="teams">' +
      '<div class="team">' + t1Flag + '<span class="tname">' + t1Name + '</span></div>' +
      scoreOrVs +
      '<div class="team">' + t2Flag + '<span class="tname">' + t2Name + '</span></div>' +
      '</div>' +
      '<div class="meta">' + (match.date || '') + ' · ' + (match.venue || '') + '</div>' +
      probHtml +
      '</div>';
  }).join('');
  
  // Update active filter states
  stageDiv.querySelectorAll('button').forEach(b => b.classList.toggle('active', (b.textContent==='All'&&!stage)||b.textContent==='Group Stage'&&stage==='group'||b.textContent==='Knockout'&&stage==='knockout'));
  if (groupDiv.style.display !== 'none') {
    groupDiv.querySelectorAll('button').forEach(b => b.classList.toggle('active', (b.textContent==='All'&&!filterGroup)||b.textContent===filterGroup));
  }
}

// ===================== RENDER: TEAM DETAIL =====================
function renderTeamDetail(teamId) {
  const t = store.teams ? store.teams.find(x => x.id === teamId) : null;
  if (!t) { document.getElementById('detail-content').innerHTML = '<div class="empty-state"><p>Team not found</p></div>'; return; }
  
  const perf = t.performance || {};
  const rating = perf.rating_100 || Math.round(1 + (t.elo_rating - 1380) / 580 * 99);
  const form = t.recent_form || [];
  let ratingColor = '#ff6b35';
  if (rating >= 80) ratingColor = 'var(--green)';
  else if (rating >= 60) ratingColor = 'var(--blue)';
  else if (rating >= 40) ratingColor = 'var(--yellow)';
  
  // All other teams for predict dropdown
  const otherTeams = store.teams ? store.teams.filter(x => x.id !== teamId) : [];
  
  document.getElementById('detail-content').innerHTML = 
    '<div class="team-detail">' +
    '<button class="back-btn" onclick="navigate(\'teams\')">← Back to Teams</button>' +
    (t.is_host ? '<div class="host-badge">🏠 Host Nation</div>' : '') +
    '<div class="detail-header">' +
    flagImg(t) +
    '<div><h1>' + t.name + '</h1><div class="big-rating" style="color:'+ratingColor+'">' + rating + ' <span>/ 100</span></div></div>' +
    '</div>' +
    '<div id="detail-map" class="detail-map"></div>' +
    '<div class="stats-grid">' +
    '<div class="stat-card"><div class="stat-value">#' + (t.fifa_rank || '?') + '</div><div class="stat-label">FIFA Rank</div></div>' +
    '<div class="stat-card"><div class="stat-value">' + (t.elo_rating || '?') + '</div><div class="stat-label">ELO Rating</div></div>' +
    '<div class="stat-card"><div class="stat-value">$' + (t.squad_value_millions || '?') + 'M</div><div class="stat-label">Squad Value</div></div>' +
    '<div class="stat-card"><div class="stat-value">' + (t.confederation || '?') + '</div><div class="stat-label">Confederation</div></div>' +
    '</div>' +
    (form.length > 0 ? '<div class="form-section"><h3>Recent Form</h3><div class="form-timeline">' + form.slice(0,10).map(m => '<div class="form-box form-'+m.result+'" title="vs '+m.opponent+' ('+m.goals_for+'-'+m.goals_against+')">'+m.result+'</div>').join('') + '</div>' +
    '<div class="form-details">' + form.slice(0,10).map(m => '<div class="form-match"><div>vs '+m.opponent+'</div><div class="score">'+m.goals_for+'-'+m.goals_against+'</div><div>'+m.date+'</div></div>').join('') + '</div></div>' : '') +
    '<div class="predict-section"><h3>Predict vs...</h3>' +
    '<select id="predict-opponent"><option value="">Select opponent...</option>' + otherTeams.map(x => '<option value="'+x.id+'">'+x.name+'</option>').join('') + '</select>' +
    '<div id="predict-result" class="pred-result"></div></div>' +
    '</div>';
  
  // Init map
  if (t.lat && t.lng) {
    setTimeout(() => {
      const mapEl = document.getElementById('detail-map');
      if (mapEl && !mapEl._leaflet_id) {
        const map = L.map('detail-map').setView([t.lat, t.lng], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
          attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
          maxZoom: 10
        }).addTo(map);
        L.circleMarker([t.lat, t.lng], {
          radius: 12,
          fillColor: '#ff6b35',
          color: '#fff',
          weight: 2,
          opacity: 1,
          fillOpacity: 0.8
        }).addTo(map).bindPopup('<b>' + t.name + '</b><br>FIFA #' + (t.fifa_rank || '?') + ' | Rating: ' + rating + '/100');
      }
    }, 100);
  }
  
  // Predict handler
  document.getElementById('predict-opponent').onchange = async function() {
    const oppId = this.value;
    const resultDiv = document.getElementById('predict-result');
    if (!oppId) { resultDiv.classList.remove('show'); return; }
    resultDiv.classList.add('show');
    resultDiv.innerHTML = '<div class="loading-text">Predicting...</div>';
    
    try {
      const resp = await fetch(API+'/api/predict?team1_id='+teamId+'&team2_id='+oppId);
      const data = await resp.json();
      const p = data.prediction;
      const opp = store.teams.find(x => x.id === parseInt(oppId));
      
      resultDiv.innerHTML = 
        '<div style="text-align:center;margin-bottom:12px"><strong>' + data.team1.name + '</strong> vs <strong>' + data.team2.name + '</strong></div>' +
        '<div class="prob-bar"><div style="background:var(--green);width:'+p.team1_win_prob+'%"></div><div style="background:var(--muted);width:'+p.draw_prob+'%"></div><div style="background:var(--red);width:'+p.team2_win_prob+'%"></div></div>' +
        '<div class="prob-labels"><span>'+data.team1.name+': '+p.team1_win_prob+'%</span><span>Draw: '+p.draw_prob+'%</span><span>'+data.team2.name+': '+p.team2_win_prob+'%</span></div>' +
        '<div class="pred-score">Predicted score: ' + p.predicted_score + ' | xG: ' + p.team1_xg + ' - ' + p.team2_xg + '</div>' +
        (p.key_factors && p.key_factors.length > 0 ? '<div style="margin-top:8px;font-size:12px;color:var(--muted)">' + p.key_factors.map(f=>'• '+f).join('<br>') + '</div>' : '');
    } catch(e) {
      resultDiv.innerHTML = '<p style="color:var(--red)">Prediction failed. Is the API running?</p>';
    }
  };
}

// ===================== RENDER: BRACKET =====================
function renderBracket() {
  const b = store.bracket;
  if (!b) return;
  
  const rounds = [
    {key: 'round_of_32', label: 'Round of 32', matches: b.round_of_32},
    {key: 'round_of_16', label: 'Round of 16', matches: b.round_of_16},
    {key: 'quarter_finals', label: 'Quarter Finals', matches: b.quarter_finals},
    {key: 'semi_finals', label: 'Semi Finals', matches: b.semi_finals},
    {key: 'final', label: 'Final', matches: b.final},
  ];
  
  let champHtml = '';
  if (b.predicted_champion) {
    champHtml = '<div style="text-align:center;margin-top:32px;padding:24px;background:var(--card);border:2px solid var(--accent);border-radius:var(--radius)"><div style="font-size:48px">🏆</div><div style="font-size:20px;font-weight:700;margin-top:8px">Predicted Champion</div><div style="font-size:32px;font-weight:800;color:var(--accent);margin-top:4px">' + b.predicted_champion + '</div></div>';
  }
  
  document.getElementById('bracket-content').innerHTML =
    '<div class="bracket-wrapper"><div class="bracket">' +
    rounds.map(r => {
      if (!r.matches || r.matches.length === 0) return '';
      return '<div class="bracket-round"><h4>' + r.label + '</h4>' +
        r.matches.map(m => {
          const isWinner = m.predicted_winner;
          return '<div class="bracket-match">' +
            '<div class="bt"><span class="flag-fallback">' + (m.team1_flag || '🏳️') + '</span><span class="bn" style="' + (isWinner===m.team1 ? 'color:var(--green);font-weight:700' : '') + '">' + m.team1 + '</span><span class="bprob">' + (m.team1_win_prob || '?') + '%</span></div>' +
            '<div class="bt" style="margin-top:4px"><span class="flag-fallback">' + (m.team2_flag || '🏳️') + '</span><span class="bn" style="' + (isWinner===m.team2 ? 'color:var(--green);font-weight:700' : '') + '">' + m.team2 + '</span><span class="bprob">' + (m.team2_win_prob || '?') + '%</span></div>' +
            '</div>';
        }).join('') +
        '</div>';
    }).join('') +
    '</div></div>' + champHtml;
}

loadAllData();
